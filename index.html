<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.179.1/+esm",
                "belowjs": "https://cdn.jsdelivr.net/npm/belowjs@1.7.2/dist/belowjs.js"
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/belowjs@1.7.2/dist/belowjs.css">
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; font-family:sans-serif; }
        .below-measurement-label { color:white; background:rgba(0,0,0,0.6); padding:2px 6px; border-radius:4px; font-size:14px; pointer-events:none; }
    </style>
    <title>3D查看器（增强版）</title>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { ModelViewer } from 'belowjs';

        // 1. 配置查看器
        const config = {
            models: {
                'myModel': {
                    url: 'planAview.glb',    // 请确保文件名正确
                    name: '我的模型',
                    measurable: true
                }
            },
            enableVR: true,
            enableMeasurement: true,
            measurement: { unit: 'mm', decimalPlaces: 2 },
            enableDiveSystem: false,       // 关闭水下效果，完全由自定义光照控制
            enableScreenshot: true
        };

        // 2. 初始化查看器
        const viewer = new ModelViewer('body', config);
        console.log('查看器已启动');

        // 3. 等待模型加载完成（load事件可能过早触发，改用update事件或延迟执行）
        //    使用轮询方式等待模型真正可用
        let attempts = 0;
        const maxAttempts = 20;
        const interval = setInterval(() => {
            attempts++;
            // 通过检查场景中是否有Mesh来判断模型是否已加载
            let hasMesh = false;
            viewer.viewer.scene.traverse(child => { if (child.isMesh) hasMesh = true; });
            
            if (hasMesh || attempts > maxAttempts) {
                clearInterval(interval);
                if (hasMesh) {
                    console.log('模型已加载，开始调整...');
                    adjustModel();
                } else {
                    console.warn('未检测到模型，请检查文件路径或格式');
                }
            }
        }, 500); // 每500ms检查一次

        function adjustModel() {
            const scene = viewer.viewer.scene;

            // ----- 彻底清除原有光照（防止干扰）-----
            // 移除所有光源
            const lights = [];
            scene.traverse(child => { if (child.isLight) lights.push(child); });
            lights.forEach(light => scene.remove(light));

            // ----- 添加全新的强光照（多光源组合）-----
            // 环境光（柔光）
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
            // 主平行光1（左前上）
            const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.8);
            dirLight1.position.set(2, 5, 3);
            // 主平行光2（右后下，补充背光）
            const dirLight2 = new THREE.DirectionalLight(0xffffff, 1.0);
            dirLight2.position.set(-3, 1, -4);
            // 半球光（模拟天光，增加暗部亮度）
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);

            scene.add(ambientLight);
            scene.add(dirLight1);
            scene.add(dirLight2);
            scene.add(hemiLight);

            // ----- 计算模型整体包围盒（考虑所有Object3D，包括Group）-----
            const box = new THREE.Box3();
            // 扩大计算范围：包括所有Object3D（但排除相机、光源等）
            scene.traverse(obj => {
                if (obj.isMesh || obj.isGroup) {
                    // 对于Group，需要计算其子物体的世界位置
                    if (obj.isMesh) {
                        box.expandByObject(obj);
                    } else if (obj.isGroup) {
                        obj.children.forEach(child => {
                            if (child.isMesh) box.expandByObject(child);
                        });
                    }
                }
            });

            if (!box.isEmpty()) {
                const center = new THREE.Vector3();
                box.getCenter(center);
                const size = box.getSize(new THREE.Vector3());
                console.log('模型中心:', center, '尺寸:', size);

                // 将所有物体移动到原点
                scene.traverse(obj => {
                    if (obj.isMesh) {
                        obj.position.sub(center);   // 减去中心坐标
                    }
                });

                // 调整相机：将目标设为原点，并自动调节距离以适合模型大小
                const camera = viewer.viewer.camera;
                camera.lookAt(0, 0, 0);
                // 根据模型大小调整相机距离（可选）
                const maxDim = Math.max(size.x, size.y, size.z);
                if (maxDim > 0) {
                    // 默认距离为模型对角线的1.5倍
                    const distance = maxDim * 1.5;
                    camera.position.set(distance, distance * 0.6, distance);
                    camera.lookAt(0, 0, 0);
                }
            } else {
                console.warn('无法计算包围盒，可能模型为空');
            }

            // 强制更新渲染
            viewer.viewer.render();
            console.log('调整完成');
        }
    </script>
</body>
</html>
