<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <!-- 使用 Import Map 指定 Three.js 和 BelowJS 的依赖 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.179.1/+esm",
                "belowjs": "https://cdn.jsdelivr.net/npm/belowjs@1.7.2/dist/belowjs.js"
            }
        }
    </script>
    <!-- 引入 BelowJS 的样式（测量工具等需要） -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/belowjs@1.7.2/dist/belowjs.css">
    <style>
        /* 全屏显示，无滚动条 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }
        /* 测量标签样式（可选） */
        .below-measurement-label {
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
    <title>在线3D查看器（模型居中+测量工具）</title>
</head>
<body>
    <script type="module">
        // 导入所需模块
        import * as THREE from 'three';
        import { ModelViewer } from 'belowjs';

        // 1. 配置查看器
        const config = {
            models: {
                'myModel': {
                    url: '3Dview.glb',      // 请确保文件名正确（区分大小写）
                    name: '我的模型',
                    measurable: true         // 允许对该模型进行测量
                }
            },
            // 功能开关
            enableVR: false,                  // 关闭VR，避免干扰工具栏
            enableMeasurement: true,           // 启用测量工具
            measurement: {                     // 测量单位设置
                unit: 'mm',
                decimalPlaces: 2
            },
            enableDiveSystem: false,           // 关闭水下效果，使用自定义光照
            enableScreenshot: true             // 启用截图
        };

        // 2. 初始化查看器
        const viewer = new ModelViewer('body', config);
        console.log('3D查看器已启动', viewer);

        // 3. 等待查看器加载完成，然后添加自定义光照和模型居中处理
        viewer.addEventListener('load', () => {
            // 获取Three.js场景对象
            const scene = viewer.viewer.scene;

            // ----- 自定义光照（让模型更亮、更白） -----
            // 环境光：均匀照亮，强度1.5，纯白色
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
            // 主平行光：产生立体感，强度2.0，纯白色
            const directionalLight = new THREE.DirectionalLight(0xffffff, 2.0);
            directionalLight.position.set(5, 10, 7);
            directionalLight.castShadow = true;  // 可选，开启阴影

            scene.add(ambientLight);
            scene.add(directionalLight);

            // ----- 模型居中：将模型整体移动到原点，使旋转中心落在模型中心 -----
            // 计算场景中所有网格的包围盒
            const box = new THREE.Box3();
            scene.traverse((child) => {
                if (child.isMesh) {
                    box.expandByObject(child);
                }
            });

            if (!box.isEmpty()) {
                const center = new THREE.Vector3();
                box.getCenter(center);
                const offset = center.clone().negate(); // 需要移动的偏移量

                // 将所有网格按偏移量移动
                scene.traverse((child) => {
                    if (child.isMesh) {
                        child.position.add(offset);
                    }
                });

                // 更新相机的目标点，使其看向原点
                viewer.viewer.camera.lookAt(0, 0, 0);
                console.log('模型已居中，原中心点：', center);
            }

            console.log('自定义光照已添加');
        });
    </script>
</body>
</html>
