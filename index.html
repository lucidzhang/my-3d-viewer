<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <!-- 使用 Import Map 来指定 Three.js 和 BelowJS 的依赖 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.179.1/+esm",
                "belowjs": "https://cdn.jsdelivr.net/npm/belowjs@1.7.2/dist/belowjs.js"
            }
        }
    </script>
    <!-- 引入 BelowJS 的样式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/belowjs@1.7.2/dist/belowjs.css">
    <style>
        /* 让查看器填满整个浏览器窗口 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }
        /* 可选：为测量工具标签添加一些基础样式 */
        .below-measurement-label {
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
    <title>我的在线3D查看器</title>
</head>
<body>
    <script type="module">
        // 从 BelowJS 库中导入 ModelViewer 类
        import { ModelViewer } from 'belowjs';

        // 1. 配置您的模型
        // 请将 '你的模型文件.glb' 替换为您自己的 GLB 文件路径
        // 如果模型文件和 index.html 在同一个文件夹，直接写文件名即可，例如 'my_model.glb'
        const config = {
            models: {
                'myModel': { // 模型的ID，可以自定义
                    url: '3Dview.glb', // <-- 重点：在这里修改为您的模型文件名
                    name: '我的模型',        // 模型显示名称
                    measurable: true         // 开启测量工具
                }
            },
            // 2. 开启您需要的功能
            enableVR: true,                 // 暂不开启VR
            enableMeasurement: true,          // 开启测量工具
            enableDiveSystem: true,          // 水下效果（非必需，可关闭）
            enableScreenshot: true            // 开启截图功能 [citation:2]
        };

        // 3. 初始化查看器，将其绑定到 body 元素上
        const viewer = new ModelViewer('body', config);

        // 可选：查看器加载完成后可以做些什么
        console.log('3D查看器已启动', viewer);
    </script>
</body>
</html>
